<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>

<body>
    <div class="mainbox">
        <div class="container">
            <div class="box b1">
                <div class="first-row">
                    <p class="title">USERNAME</p>
                    <div class="signal"></div>
                </div>
                <input type="text" placeholder="Enter username" id="id_username">
                <p class="end-line">4-16 characters</p>
            </div>
            <div class="box b2">
                <div class="first-row">
                    <p class="title">EMAIL</p>
                    <div class="signal"></div>
                </div>
                <input type="email" placeholder="example@gmail.com" id="id_email">
                <p class="end-line">Valid email required</p>
            </div>
            <div class="box b3">
                <div class="first-row">
                    <p class="title">PASSWORD</p>
                    <div class="signal"></div>
                </div>
                <input type="password" placeholder="********" id="id_password1">
                <p class="end-line">Min 8 characters</p>
            </div>
            <div class="box b4">
                <div class="first-row">
                    <p class="title">Confirm</p>
                    <div class="signal"></div>
                </div>
                <input type="password" placeholder="********" id="id_password2">
                <p class="end-line">Must match password</p>
            </div>
        </div>
    </div>

</body>

</html>
